name: PR CI

on:
  pull_request:
    branches:
      - develop
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kgusmart
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d kgusmart"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      GOOGLE_API_KEY: test-key
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/kgusmart

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY || 'ci-test-key' }}
        run: |
          python -m pytest
