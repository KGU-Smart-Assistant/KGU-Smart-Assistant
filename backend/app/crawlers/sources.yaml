defaults:
  recent_documents: &recent_documents
    min_published_year: 2018

  portal_notice: &portal_notice
    <<: *recent_documents
    category: notice
    max_pages: 0
    max_depth: 2
    max_pagination_pages: 200
    skip_images: true
    follow_patterns:
      - "bbsno=1073"
      - "bbsno=549"
    collect_patterns:
      - "selectbbsnttview.do"
    exclude_patterns:
      - "login"
      - "logout"
      - "signup"
      - "search.do"
      - "javascript:"
      - "mailto:"
    collect_seed_pages: false
    embed: true
    embedding_limit: 150
    attachment_embedding_limit: 100

  portal_materials: &portal_materials
    <<: *recent_documents
    category: materials
    max_pages: 0
    max_depth: 2
    max_pagination_pages: 200
    skip_images: true
    follow_patterns:
      - "bbsno=684"
      - ".pdf"
      - ".docx"
      - ".hwp"
      - ".hwpx"
      - ".zip"
    collect_patterns:
      - "selectbbsnttview.do"
    exclude_patterns:
      - "login"
      - "logout"
      - "signup"
      - "search.do"
      - "javascript:"
      - "mailto:"
    collect_seed_pages: false
    embed: true
    embedding_limit: 150
    attachment_embedding_limit: 200

  portal_faq: &portal_faq
    <<: *recent_documents
    category: faq
    max_pages: 0
    max_depth: 2
    max_pagination_pages: 200
    follow_patterns:
      - "bbsno=950"
      - "faq"
    collect_patterns:
      - "bbsno=950"
      - "faq"
    exclude_patterns:
      - "login"
      - "logout"
      - "signup"
      - "search.do"
      - "javascript:"
      - "mailto:"
    collect_seed_pages: false
    embed: true
    embedding_limit: 150

  portal_schedule: &portal_schedule
    <<: *recent_documents
    category: academic_schedule
    max_pages: 3
    max_depth: 1
    follow_patterns:
      - "selecttnschafsschdullistus.do"
      - "학사일정"
    collect_patterns:
      - "selecttnschafsschdullistus.do"
    exclude_patterns:
      - "login"
      - "logout"
      - "signup"
      - "search.do"
      - "javascript:"
      - "mailto:"
    collect_seed_pages: false
    embed: true
    embedding_limit: 150

  external_notice: &external_notice
    <<: *recent_documents
    category: notice
    max_pages: 0
    max_depth: 2
    follow_patterns:
      - "board"
      - "bo_idx=1"
      - "index.php"
      - ".pdf"
      - ".docx"
      - ".hwp"
      - ".hwpx"
      - ".zip"
    collect_patterns:
      - "board"
      - "index.php"
    exclude_patterns:
      - "login"
      - "logout"
      - "javascript:"
      - "mailto:"
    collect_seed_pages: false
    embed: true
    embedding_limit: 150
    attachment_embedding_limit: 100

