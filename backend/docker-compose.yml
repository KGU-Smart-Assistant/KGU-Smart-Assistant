services:
  frontend:
    build:
      context: ../frontend/frontend-app
      dockerfile: Dockerfile
    container_name: next-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_KAKAOMAP_KEY: ${NEXT_PUBLIC_KAKAOMAP_KEY:-replace_with_your_kakao_javascript_key}
      NEXT_TELEMETRY_DISABLED: 1
      WATCHPACK_POLLING: true
    volumes:
      - ../frontend/frontend-app:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build: .
    container_name: fastapi-app
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      VECTOR_STORE_MODE: http
      VECTOR_STORE_HOST: chroma
      VECTOR_STORE_PORT: 8000
    depends_on:
      db:
        condition: service_healthy
      chroma:
        condition: service_started
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=2)\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  crawler:
    profiles: ["crawler"]
    build:
      context: .
      dockerfile: Dockerfile.crawler
    container_name: crawler
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      VECTOR_STORE_MODE: http
      VECTOR_STORE_HOST: chroma
      VECTOR_STORE_PORT: 8000
      CRAWLER_INGEST_ARGS: ${CRAWLER_INGEST_ARGS:---store-db --store-vectors}
      CRAWLER_LOCK_NAME: ${CRAWLER_LOCK_NAME:-kgu-smart-assistant:crawler-ingest}
      CRAWLER_KEEP_ALIVE: "true"
    depends_on:
      db:
        condition: service_healthy
      chroma:
        condition: service_started
    command: >
      sh -c "alembic upgrade head &&
      python -m app.crawlers.run_once"

  db:
    image: postgres:15
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-kgusmart}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 12

  chroma:
    image: chromadb/chroma:1.5.3
    container_name: chroma-db
    ports:
      - "${CHROMA_HOST_PORT:-8001}:8000"
    volumes:
      - chroma_data:/data
      - ./chroma.docker.yaml:/chroma/config.yaml:ro
    environment:
      CONFIG_PATH: /chroma/config.yaml

volumes:
  postgres_data:
  chroma_data:
  frontend_node_modules:
  frontend_next:
